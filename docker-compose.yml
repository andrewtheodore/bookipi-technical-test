version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flash-sale-postgres
    environment:
      POSTGRES_USER: flashsale
      POSTGRES_PASSWORD: flashsale123
      POSTGRES_DB: flashsale
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flash-sale-redis
    ports:
      - '6379:6379'

volumes:
  postgres_data:
